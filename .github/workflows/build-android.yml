name: Build Android TWA (Google Play Store)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer, must increment each release)'
        required: true
        default: '1'
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap CLI
        run: npm install -g @nicepkg/nicewrap || npm install -g @nicepkg/nicewrap@latest

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Update TWA manifest version
        run: |
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            manifest.appVersionCode = parseInt('${{ github.event.inputs.version_code }}');
            manifest.appVersionName = '${{ github.event.inputs.version_name }}';
            fs.writeFileSync('twa-manifest.json', JSON.stringify(manifest, null, 2));
          "

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build TWA with Bubblewrap
        run: |
          mkdir -p twa-build && cd twa-build
          npx @nicepkg/nicewrap init --manifest ../twa-manifest.json
          npx @nicepkg/nicewrap build \
            --signingKeyPath ../keystore.jks \
            --signingKeyAlias demar-logistics
        env:
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: demar-logistics-${{ github.event.inputs.version_name }}
          path: |
            twa-build/app-release-bundle.aab
            twa-build/app-release-signed.apk
          retention-days: 90

      - name: Build summary
        run: |
          echo "## Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ github.event.inputs.version_name }} (${{ github.event.inputs.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: com.demartransportation.logistics" >> $GITHUB_STEP_SUMMARY
          echo "- Download the AAB from the Artifacts section to upload to Google Play Console" >> $GITHUB_STEP_SUMMARY
