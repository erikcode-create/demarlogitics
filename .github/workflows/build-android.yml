name: Build Android TWA (Google Play Store)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer, must increment each release)'
        required: true
        default: '1'
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Update version in build.gradle
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.event.inputs.version_code }}/" android/app/build.gradle
          sed -i 's/versionName "1.0.0"/versionName "${{ github.event.inputs.version_name }}"/' android/app/build.gradle

      - name: Build Release AAB
        working-directory: android
        run: |
          chmod +x gradlew 2>/dev/null || gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: demar-logistics-${{ github.event.inputs.version_name }}-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: demar-logistics-${{ github.event.inputs.version_name }}-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Build summary
        run: |
          echo "## Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ github.event.inputs.version_name }} (${{ github.event.inputs.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: com.demartransportation.logistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the AAB from the Artifacts section below" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to Google Play Console > Internal Testing" >> $GITHUB_STEP_SUMMARY
          echo "3. Create a new release and upload the .aab file" >> $GITHUB_STEP_SUMMARY
          echo "4. Add release notes and roll out to internal testers" >> $GITHUB_STEP_SUMMARY
